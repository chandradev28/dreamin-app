name: dreamin_app
description: "A high-fidelity music streaming app"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Networking
  dio: ^5.4.3+1

  # Audio Playback
  just_audio: ^0.9.39
  audio_service: ^0.18.13
  just_audio_background: ^0.0.1-beta.13

  # Local Storage
  drift: ^2.18.0
  sqlite3_flutter_libs: 0.5.18
  path_provider: ^2.1.3
  shared_preferences: ^2.2.3

  # UI Components
  cached_network_image: ^3.3.1
  flutter_svg: ^2.0.10+1
  shimmer: ^3.0.0
  google_fonts: ^6.2.1

  # Navigation
  go_router: ^14.2.0

  # Utilities
  equatable: ^2.0.5
  intl: ^0.19.0
  uuid: ^4.4.0
  collection: ^1.18.0

  # Icons
  cupertino_icons: ^1.0.8
  iconsax: ^0.0.8
  path: ^1.9.0
  palette_generator: ^0.3.3+7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  
  # Code Generation
  build_runner: ^2.4.11
  riverpod_generator: ^2.4.0
  drift_dev: ^2.18.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
